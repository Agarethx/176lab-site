<!-- ── 404 ─────────────────────────────────────────────────── -->
<section class="relative min-h-screen pt-16 flex flex-col items-center justify-center text-center px-6 bg-gray-950 overflow-hidden">

  <!-- Ambient glow -->
  <div class="absolute inset-0 pointer-events-none" aria-hidden="true" style="background: radial-gradient(ellipse 50% 40% at 50% 50%, rgba(99,102,241,0.08), transparent);"></div>

  <div class="relative z-10 max-w-lg">
    <p data-animate class="text-[160px] sm:text-[200px] font-black leading-none text-white/5 select-none mb-0 invisible" aria-hidden="true">404</p>
    <h1 data-animate class="text-2xl md:text-4xl font-extrabold text-white -mt-8 mb-4 invisible">
      Página no encontrada
    </h1>
    <p data-animate data-animate-delay="0.1" class="text-white/40 text-base leading-relaxed mb-10 invisible">
      La URL que buscas no existe o fue movida. Vuelve al inicio y continúa explorando.
    </p>
    <a
      data-animate
      data-animate-delay="0.2"
      data-hover
      href="/"
      class="inline-block px-8 py-4 bg-accent hover:bg-accent-alt text-white font-semibold rounded-full transition-colors duration-200 invisible"
    >
      ← Volver al inicio
    </a>
  </div>

</section>
