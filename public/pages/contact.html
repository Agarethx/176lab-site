<!-- ── CONTACT ─────────────────────────────────────────────── -->
<section class="bg-gray-950 min-h-screen pt-32 pb-24 px-6">
  <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-20 items-start">

    <!-- Left: Info -->
    <div>
      <span data-animate class="block text-xs font-semibold tracking-widest uppercase text-accent mb-4 invisible">Contacto</span>
      <h1 data-animate class="text-4xl md:text-6xl font-extrabold text-white leading-tight mb-8 invisible">
        Hablemos<br />de tu proyecto.
      </h1>
      <p data-animate data-animate-delay="0.1" class="text-white/50 text-base leading-relaxed mb-12 max-w-sm invisible">
        Cuéntanos qué tienes en mente. Respondemos en menos de 24 horas y sin rodeos.
      </p>

      <ul data-animate data-animate-delay="0.15" class="space-y-6 invisible">
        <li class="flex items-start gap-4">
          <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center shrink-0 mt-0.5" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div>
            <p class="text-white/30 text-xs font-medium uppercase tracking-widest mb-1">Email</p>
            <a href="mailto:hola@176lab.com" class="text-white/70 hover:text-white transition-colors text-sm font-medium">hola@176lab.com</a>
          </div>
        </li>
        <li class="flex items-start gap-4">
          <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center shrink-0 mt-0.5" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <p class="text-white/30 text-xs font-medium uppercase tracking-widest mb-1">Ubicación</p>
            <p class="text-white/70 text-sm font-medium">Santiago, Chile</p>
          </div>
        </li>
        <li class="flex items-start gap-4">
          <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center shrink-0 mt-0.5" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div>
            <p class="text-white/30 text-xs font-medium uppercase tracking-widest mb-1">Respuesta</p>
            <p class="text-white/70 text-sm font-medium">En menos de 24 horas</p>
          </div>
        </li>
      </ul>

      <div data-animate data-animate-delay="0.2" class="flex items-center gap-5 mt-12 invisible">
        <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="text-white/30 hover:text-white transition-colors text-sm font-medium">GitHub</a>
        <span class="w-px h-4 bg-white/10" aria-hidden="true"></span>
        <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="text-white/30 hover:text-white transition-colors text-sm font-medium">LinkedIn</a>
        <span class="w-px h-4 bg-white/10" aria-hidden="true"></span>
        <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" class="text-white/30 hover:text-white transition-colors text-sm font-medium">Twitter / X</a>
      </div>
    </div>

    <!-- Right: Form -->
    <div data-animate data-animate-delay="0.1" class="invisible">
      <form
        id="contact-form"
        class="space-y-8"
        novalidate
        onsubmit="handleContactSubmit(event)"
      >
        <div>
          <label for="name" class="block text-xs font-semibold uppercase tracking-widest text-white/30 mb-3">Nombre</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            autocomplete="name"
            placeholder="Tu nombre completo"
            class="field"
          />
        </div>

        <div>
          <label for="email" class="block text-xs font-semibold uppercase tracking-widest text-white/30 mb-3">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
            placeholder="hola@tuempresa.com"
            class="field"
          />
        </div>

        <div>
          <label for="subject" class="block text-xs font-semibold uppercase tracking-widest text-white/30 mb-3">Asunto</label>
          <input
            type="text"
            id="subject"
            name="subject"
            placeholder="¿En qué podemos ayudarte?"
            class="field"
          />
        </div>

        <div>
          <label for="message" class="block text-xs font-semibold uppercase tracking-widest text-white/30 mb-3">Mensaje</label>
          <textarea
            id="message"
            name="message"
            required
            rows="5"
            placeholder="Cuéntanos sobre tu proyecto, presupuesto y plazos..."
            class="field"
          ></textarea>
        </div>

        <div id="form-feedback" class="hidden text-sm font-medium rounded-xl px-4 py-3"></div>

        <button
          type="submit"
          id="submit-btn"
          data-hover
          class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-10 py-4 bg-accent hover:bg-accent-alt text-white font-semibold rounded-full transition-colors duration-200"
        >
          Enviar mensaje
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </form>
    </div>

  </div>
</section>

<script>
function handleContactSubmit(e) {
  e.preventDefault()
  const form = document.getElementById('contact-form')
  const btn = document.getElementById('submit-btn')
  const feedback = document.getElementById('form-feedback')

  const data = Object.fromEntries(new FormData(form))
  if (!data.name || !data.email || !data.message) {
    feedback.textContent = 'Por favor completa nombre, email y mensaje.'
    feedback.className = 'text-sm font-medium rounded-xl px-4 py-3 bg-red-500/10 text-red-400 border border-red-500/20'
    return
  }

  btn.disabled = true
  btn.textContent = 'Enviando...'

  // Simulate async send — replace with your real endpoint
  setTimeout(() => {
    form.reset()
    btn.disabled = false
    btn.innerHTML = 'Mensaje enviado <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>'
    btn.classList.replace('bg-accent', 'bg-emerald-600')
    btn.classList.replace('hover:bg-accent-alt', 'hover:bg-emerald-700')
    feedback.textContent = '¡Gracias! Te contactaremos en menos de 24 horas.'
    feedback.className = 'text-sm font-medium rounded-xl px-4 py-3 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20'
  }, 1200)
}
</script>
